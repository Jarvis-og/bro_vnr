slam_toolbox:
  ros__parameters:


    use_sim_time: false
    mode: mapping

    map_frame: map
    odom_frame: odom
    base_frame: base

    scan_topic: scan

    resolution: 0.05
    max_laser_range: 12.0

    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    
    tranform_publish_period: 0.05
    tranform_tolerance: 0.3
    
    map_update_interval: 2.0
    
    enable_interactive_mode: true
    enable_scan_visualization: true
    enable_graph_visualization: true
    
