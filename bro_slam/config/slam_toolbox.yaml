slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping

    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: scan

    transform_publish_period: 0.05
    transform_tolerace: 0.3

    resolution: 0.05
    map_update_interval: 2.0

    minimum_traveling_distance: 0.05
    minimum_traveling_heading: 0.05

    enable_interactive_mode: true
    enable_scan_visualization: true
    enable_graph_visualization: true

    use_scan_matching: true
    use_scan_barycenter: true
    use_response_expansion: true